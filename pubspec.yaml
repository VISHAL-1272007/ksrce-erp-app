name: ksrce_erp
description: KSRCE ERP - Enterprise Resource Planning System for K.S.R. College of Engineering
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.0
  firebase_database: ^11.3.10
  firebase_messaging: 15.2.10
  go_router: ^13.2.0
  provider: ^6.1.0
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  excel: ^4.0.6
  google_fonts: ^6.1.0
  crypto: ^3.0.3
  url_launcher: ^6.2.0
  file_picker: ^8.0.0
  fl_chart: ^0.68.0
  charts_flutter: ^0.12.0
  badges: ^3.1.0
  shimmer: ^3.0.0
  table_calendar: ^3.1.0
  collection: ^1.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/data/

dependency_overrides:
  intl: ^0.19.0

