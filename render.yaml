services:
  - type: web
    name: ksrce-erp-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: ksrce-erp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: ksrce-erp-db
    databaseName: ksrce_erp
    user: ksrce_user
