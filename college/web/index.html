<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="KSRCE Campus ERP — AI-powered academic platform for Students, Faculty, and HODs at KSR College of Engineering.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KSRCE Campus ERP">
  <meta name="theme-color" content="#1e3a8a">
  <meta property="og:title" content="KSRCE Campus ERP — AI-Powered Academic Platform">
  <meta property="og:description" content="Manage courses, grades, attendance, and AI tutoring — all in one place for KSRCE.">
  <!-- Z++ Security: Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://res.cloudinary.com https://*.cloudinary.com; connect-src 'self' https://ksrce-erp-default-rtdb.firebaseio.com https://api.cloudinary.com https://res.cloudinary.com https://www.gstatic.com https://fonts.gstatic.com https://fonts.googleapis.com; frame-src 'none'; object-src 'none'; base-uri 'self';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <!-- X-Frame-Options must be set via HTTP header, not meta tag -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  
  <title>KSRCE Campus ERP — Smart Academic Management System</title>
  <link rel="manifest" href="manifest.json">
  <!-- Preload critical resources for faster loading -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #1e3a8a 100%);
      transition: opacity 0.5s ease;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 9999;
    }
    
    .loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    .logo-container {
      width: 90px;
      height: 90px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }
    
    .logo-text {
      font-size: 36px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
    }
    
    .loading-content {
      text-align: center;
      color: white;
    }
    
    .loading-content h1 {
      font-size: 32px;
      margin: 0;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    
    .loading-content p {
      font-size: 15px;
      margin: 8px 0 32px 0;
      color: #93c5fd;
    }
    
    .loader {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin: 0 auto;
      position: relative;
    }
    
    .loader-bar {
      position: absolute;
      top: 0;
      left: -50%;
      width: 50%;
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      animation: loading 1.5s infinite ease-in-out;
      box-shadow: 0 0 10px #3b82f6;
    }
    
    @keyframes loading {
      0% { left: -50%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-screen">
    <div class="logo-container">
      <span class="logo-text">KSR</span>
    </div>
    <div class="loading-content">
      <h1>KSRCE Campus ERP</h1>
      <p>Initializing Academic Workspace...</p>
      <div class="loader">
        <div class="loader-bar"></div>
      </div>
    </div>
  </div>
  
  <script>
    // Force unregister service worker to prevent loading cached old main.dart.js
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister().then(function(boolean) {
            console.log('Service worker unregistered:', boolean);
          });
        }
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function removeLoader() {
      var el = document.getElementById('loading');
      if (el) { 
        el.classList.add('fade-out'); 
        setTimeout(function() { el.remove(); }, 500); 
      }
    }
    
    // Fallback timeout in case Flutter engine fails to start
    setTimeout(removeLoader, 10000);
    
    // Triggered when Flutter paints the first frame
    window.addEventListener('flutter-first-frame', removeLoader);
  </script>
</body>
</html>
